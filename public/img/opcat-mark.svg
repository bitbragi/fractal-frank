<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cat silhouette: pentagon head with pointed ears -->
  <path d="M5.5 3.5 L10.5 12 L21.5 12 L26.5 3.5 L25 18.5 C25 24 20.8 28 16 28 C11.2 28 7 24 7 18.5 L5.5 3.5 Z" fill="#F96C04"/>
  <!-- Inner ear shadows -->
  <path d="M8.5 6 L11 11 L9.2 11 Z" fill="#000" opacity=".35"/>
  <path d="M23.5 6 L21 11 L22.8 11 Z" fill="#000" opacity=".35"/>
  <!-- Eye whites -->
  <ellipse cx="12" cy="18" rx="1.6" ry="2.2" fill="#fff"/>
  <ellipse cx="20" cy="18" rx="1.6" ry="2.2" fill="#fff"/>
  <!-- Pupils (vertical slits) -->
  <ellipse cx="12" cy="18" rx="0.65" ry="1.6" fill="#000"/>
  <ellipse cx="20" cy="18" rx="0.65" ry="1.6" fill="#000"/>
  <!-- Nose -->
  <path d="M15 22 L17 22 L16 23.4 Z" fill="#000"/>
  <!-- Whiskers (left) -->
  <line x1="6" y1="20.5" x2="11" y2="21.5" stroke="#000" stroke-width=".5" stroke-linecap="round" opacity=".55"/>
  <line x1="6" y1="22.8" x2="11" y2="22.8" stroke="#000" stroke-width=".5" stroke-linecap="round" opacity=".55"/>
  <!-- Whiskers (right) -->
  <line x1="26" y1="20.5" x2="21" y2="21.5" stroke="#000" stroke-width=".5" stroke-linecap="round" opacity=".55"/>
  <line x1="26" y1="22.8" x2="21" y2="22.8" stroke="#000" stroke-width=".5" stroke-linecap="round" opacity=".55"/>
</svg>
